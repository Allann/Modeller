name: VS Code Extension

on:
  push:
    branches: [main]
    tags:
      - "vscode-v*.*.*"
    paths:
      - "editors/vscode-modeller/**"
      - "src/Modeller.LanguageServer/**"
      - "src/Modeller.Parser/**"
  pull_request:
    branches: [main]
    paths:
      - "editors/vscode-modeller/**"
      - "src/Modeller.LanguageServer/**"
      - "src/Modeller.Parser/**"

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Publish language server
        run: >
          dotnet publish src/Modeller.LanguageServer/Modeller.LanguageServer.csproj
          -c Release
          -o editors/vscode-modeller/server

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: editors/vscode-modeller/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode-modeller
        run: npm ci

      - name: Compile (type-check)
        working-directory: editors/vscode-modeller
        run: npm run compile

      - name: Package
        working-directory: editors/vscode-modeller
        run: npm run package -- --no-dependencies

      - name: Upload VSIX artefact
        uses: actions/upload-artifact@v7
        with:
          name: modeller-dsl-vsix
          path: editors/vscode-modeller/*.vsix
          retention-days: 30

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/vscode-v')

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Publish language server
        run: >
          dotnet publish src/Modeller.LanguageServer/Modeller.LanguageServer.csproj
          -c Release
          -o editors/vscode-modeller/server

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: editors/vscode-modeller/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode-modeller
        run: npm ci

      - name: Publish
        working-directory: editors/vscode-modeller
        run: npm run publish -- --no-dependencies --pat ${{ secrets.VSCE_PAT }}
