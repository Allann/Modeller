name: VS Code Extension

on:
  push:
    branches: [main]
    tags:
      - "vscode-v*.*.*"
    paths:
      - "editors/vscode-modeller/**"
  pull_request:
    branches: [main]
    paths:
      - "editors/vscode-modeller/**"

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: editors/vscode-modeller

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: editors/vscode-modeller/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package
        run: npm run package -- --no-dependencies

      - name: Upload VSIX artefact
        uses: actions/upload-artifact@v7
        with:
          name: modeller-dsl-vsix
          path: editors/vscode-modeller/*.vsix
          retention-days: 30

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/vscode-v')

    defaults:
      run:
        working-directory: editors/vscode-modeller

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: editors/vscode-modeller/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish
        run: npm run publish -- --no-dependencies --pat ${{ secrets.VSCE_PAT }}
