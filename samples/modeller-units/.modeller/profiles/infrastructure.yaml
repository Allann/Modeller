# Infrastructure Only Profile
name: Infrastructure Only
description: Generates only the Infrastructure layer (EF Core entities and configurations)

# Which template pack to use
pack: csharp/clean-architecture

# Layers to generate
layers:
  - name: Infrastructure
    template: infrastructure
    output: "{variables.company}.{variables.product}.Infrastructure"

# Include all domain elements
include:
  entities: all
  enums: all
  commands: all
  queries: all
  projections: all

# Layer-specific variable overrides
layer_variables:
  Infrastructure:
    use_audit_fields: true
    generate_configurations: true
    generate_db_context: true

