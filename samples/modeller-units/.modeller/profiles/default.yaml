# Default Generation Profile
name: Domain
description: Generates Domain layer with entities, enums, commands, queries

# Which template pack to use
pack: csharp/clean-architecture

# Layers to generate
layers:
  - name: Domain
    template: domain
    output: "{variables.company}.{variables.product}.Domain"

# What domain elements to include (default: all)
include:
  entities: all
  enums: all
  commands: all
  queries: all
  projections: all

# What domain elements to exclude
exclude:
  entities: []

# Layer-specific variable overrides
layer_variables:
  Domain:
    use_audit_fields: true

