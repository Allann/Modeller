# Default Generation Profile
name: Full Stack
description: Generates Infrastructure, SDK, and API layers

# Which template pack to use
pack: csharp/clean-architecture

# Layers to generate
layers:
  - name: Infrastructure
    template: infrastructure
    output: "{variables.company}.{variables.product}.Infrastructure"

  - name: Sdk
    template: sdk
    output: "{variables.company}.{variables.product}.Sdk"

  - name: Api
    template: api
    output: "{variables.company}.{variables.product}.Api"

# What domain elements to include (default: all)
include:
  entities: all
  enums: all
  commands: all
  queries: all
  projections: all

# What domain elements to exclude
exclude:
  entities: []

# Layer-specific variable overrides
layer_variables:
  Infrastructure:
    use_audit_fields: true
    generate_configurations: true
  Sdk:
    include_validation: true
    include_fluent_validation: true
  Api:
    use_minimal_apis: true

